name: build-binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            platform: ubuntu-22.04
            target: ''
            args: '--bundles appimage'

          - name: Windows x64
            platform: windows-latest
            target: ''
            args: '--bundles nsis'

          - name: macOS Apple Silicon
            platform: macos-latest
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin --bundles dmg'

          - name: macOS Intel
            platform: macos-latest
            target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin --bundles dmg'

   runs-on: ${{ matrix.platform }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils
            
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

       - name: Verify release version
        run: |
          node -e "const fs=require('node:fs'); const pkg=JSON.parse(fs.readFileSync('package.json')); const tauri=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json')); const cargo=fs.readFileSync('src-tauri/Cargo.toml','utf8').match(/\[package\][\s\S]*?^version\s*=\s*\"([^\"]+)\"/m); const tag=process.env.GITHUB_REF_NAME; if(tag !== 'v'+tauri.version || pkg.version !== tauri.version || cargo?.[1] !== tauri.version){ console.error('Version mismatch: tag=%s package=%s tauri=%s cargo=%s',tag,pkg.version,tauri.version,cargo?.[1]); process.exit(1); }"

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: '-'
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Fern ${{ github.ref_name }}
          releaseBody: Download the installer for your operating system below.
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}
