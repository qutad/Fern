name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag matching the application version, for example v0.1.0
        required: true
        type: string
  push:
    tags:
      - 'v*'

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            platform: ubuntu-22.04
            target: ''
            args: '--bundles appimage'

          - name: Windows x64
            platform: windows-latest
            target: ''
            args: '--bundles nsis'

          - name: macOS Apple Silicon
            platform: macos-latest
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin --bundles dmg'

          - name: macOS Intel
            platform: macos-latest
            target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin --bundles dmg'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Synchronize release version
        run: |
          node -e 'const fs=require("node:fs"); const tag=process.env.RELEASE_TAG; const match=/^v\.?((?:0|[1-9]\d*)\.(?:0|[1-9]\d*)\.(?:0|[1-9]\d*)(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?)$/.exec(tag??""); if(!match){console.error(`Invalid release tag "${tag??""}". Use v0.1.2 or v.0.1.2.`);process.exit(1)} const version=match[1]; const writeJson=(path,value)=>fs.writeFileSync(path,JSON.stringify(value,null,"\t")+"\n"); const pkg=require("./package.json"); pkg.version=version; writeJson("package.json",pkg); const lock=require("./package-lock.json"); lock.version=version; lock.packages[""].version=version; writeJson("package-lock.json",lock); const tauri=require("./src-tauri/tauri.conf.json"); tauri.version=version; writeJson("src-tauri/tauri.conf.json",tauri); const replace=(path,pattern)=>{const value=fs.readFileSync(path,"utf8");if(!pattern.test(value))throw new Error(`Could not update ${path}`);fs.writeFileSync(path,value.replace(pattern,`$1${version}$2`))}; replace("src-tauri/Cargo.toml",/(\[package\][\s\S]*?^version\s*=\s*")[^"]+(".*$)/m); replace("src-tauri/Cargo.lock",/(\[\[package\]\]\r?\nname = "app"\r?\nversion = ")[^"]+(".*$)/m); console.log(`Building Fern ${version} from tag ${tag}.`);'

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: '-'
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: Fern ${{ env.RELEASE_TAG }}
          releaseBody: Download the desktop or mobile package for your operating system below.
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          args: ${{ matrix.args }}

  android:
    name: Build Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager \
            'platforms;android-36' \
            'build-tools;35.0.0' \
            'ndk;28.2.13676358'
          echo "NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> "$GITHUB_ENV"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Synchronize release version
        run: |
          node -e 'const fs=require("node:fs"); const tag=process.env.RELEASE_TAG; const match=/^v\.?((?:0|[1-9]\d*)\.(?:0|[1-9]\d*)\.(?:0|[1-9]\d*)(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?)$/.exec(tag??""); if(!match){console.error(`Invalid release tag "${tag??""}". Use v0.1.2 or v.0.1.2.`);process.exit(1)} const version=match[1]; const writeJson=(path,value)=>fs.writeFileSync(path,JSON.stringify(value,null,"\t")+"\n"); const pkg=require("./package.json"); pkg.version=version; writeJson("package.json",pkg); const lock=require("./package-lock.json"); lock.version=version; lock.packages[""].version=version; writeJson("package-lock.json",lock); const tauri=require("./src-tauri/tauri.conf.json"); tauri.version=version; writeJson("src-tauri/tauri.conf.json",tauri); const replace=(path,pattern)=>{const value=fs.readFileSync(path,"utf8");if(!pattern.test(value))throw new Error(`Could not update ${path}`);fs.writeFileSync(path,value.replace(pattern,`$1${version}$2`))}; replace("src-tauri/Cargo.toml",/(\[package\][\s\S]*?^version\s*=\s*")[^"]+(".*$)/m); replace("src-tauri/Cargo.lock",/(\[\[package\]\]\r?\nname = "app"\r?\nversion = ")[^"]+(".*$)/m); console.log(`Building Fern ${version} from tag ${tag}.`);'

      - name: Configure Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [[ -z "$ANDROID_KEYSTORE_BASE64" || -z "$ANDROID_KEYSTORE_PASSWORD" || -z "$ANDROID_KEY_ALIAS" ]]; then
            echo 'ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, and ANDROID_KEY_ALIAS secrets are required.' >&2
            exit 1
          fi
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/fern-release.jks"
          {
            echo "password=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "storeFile=$RUNNER_TEMP/fern-release.jks"
          } > src-tauri/gen/android/keystore.properties

      - name: Build signed Android APK
        run: npm run android:build

      - name: Prepare Android artifact
        run: |
          mkdir -p dist
          cp src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk dist/Fern-${RELEASE_TAG}-android-arm64.apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v6
        with:
          name: fern-android-${{ env.RELEASE_TAG }}
          path: dist/*.apk
          if-no-files-found: error

  ios:
    name: Build unsigned iOS IPA
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install iOS tooling
        run: brew install cocoapods xcodegen libimobiledevice

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Synchronize release version
        run: |
          node -e 'const fs=require("node:fs"); const tag=process.env.RELEASE_TAG; const match=/^v\.?((?:0|[1-9]\d*)\.(?:0|[1-9]\d*)\.(?:0|[1-9]\d*)(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?)$/.exec(tag??""); if(!match){console.error(`Invalid release tag "${tag??""}". Use v0.1.2 or v.0.1.2.`);process.exit(1)} const version=match[1]; const writeJson=(path,value)=>fs.writeFileSync(path,JSON.stringify(value,null,"\t")+"\n"); const pkg=require("./package.json"); pkg.version=version; writeJson("package.json",pkg); const lock=require("./package-lock.json"); lock.version=version; lock.packages[""].version=version; writeJson("package-lock.json",lock); const tauri=require("./src-tauri/tauri.conf.json"); tauri.version=version; writeJson("src-tauri/tauri.conf.json",tauri); const replace=(path,pattern)=>{const value=fs.readFileSync(path,"utf8");if(!pattern.test(value))throw new Error(`Could not update ${path}`);fs.writeFileSync(path,value.replace(pattern,`$1${version}$2`))}; replace("src-tauri/Cargo.toml",/(\[package\][\s\S]*?^version\s*=\s*")[^"]+(".*$)/m); replace("src-tauri/Cargo.lock",/(\[\[package\]\]\r?\nname = "app"\r?\nversion = ")[^"]+(".*$)/m); console.log(`Building Fern ${version} from tag ${tag}.`);'

      - name: Build unsigned iOS IPA
        run: npm run ios:build:unsigned

      - name: Prepare iOS artifact
        run: |
          mkdir -p dist
          cp src-tauri/gen/apple/build/arm64/Fern.ipa dist/Fern-${RELEASE_TAG}-ios-unsigned.ipa

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v6
        with:
          name: fern-ios-${{ env.RELEASE_TAG }}
          path: dist/*.ipa
          if-no-files-found: error

  publish-mobile:
    name: Publish mobile artifacts
    needs: [build, android, ios]
    runs-on: ubuntu-latest

    steps:
      - name: Download mobile artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: fern-*-${{ env.RELEASE_TAG }}
          path: dist
          merge-multiple: true

      - name: Attach mobile artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$RELEASE_TAG" dist/* --clobber --repo "$GITHUB_REPOSITORY"
